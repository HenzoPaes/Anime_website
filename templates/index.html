<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎌 Anime Admin Panel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #07070f;
  --bg2:     #0d0d1a;
  --bg3:     #131324;
  --card:    #0f0f1e;
  --border:  #1c1c38;
  --accent:  #7c3aed;
  --accent2: #a855f7;
  --green:   #22c55e;
  --red:     #ef4444;
  --yellow:  #f59e0b;
  --blue:    #3b82f6;
  --text:    #e2e8f0;
  --dim:     #4a4a6a;
  --muted:   #2a2a44;
  --mono:    'IBM Plex Mono', monospace;
  --sans:    'Syne', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); overflow: hidden; }
body::before {
  content: '';
  position: fixed; inset: 0; pointer-events: none; z-index: 9999;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,.03) 2px, rgba(0,0,0,.03) 4px);
}

/* ── Layout ── */
#app { display: flex; height: 100vh; }

/* ── Sidebar ── */
#sidebar {
  width: 220px; flex-shrink: 0;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow-y: auto;
}
.logo {
  padding: 20px 16px 16px;
  border-bottom: 1px solid var(--border);
}
.logo-icon { font-size: 24px; }
.logo-title {
  font-family: var(--mono); font-size: 11px; font-weight: 600;
  letter-spacing: .15em; color: var(--accent2);
  text-transform: uppercase; margin-top: 6px;
}
.logo-sub { font-family: var(--mono); font-size: 9px; color: var(--dim); margin-top: 2px; }

.nav-section {
  padding: 12px 12px 4px;
  font-family: var(--mono); font-size: 9px; letter-spacing: .12em;
  color: var(--muted); text-transform: uppercase;
}
.nav-sep { height: 1px; background: var(--border); margin: 8px 14px; }

.nav-btn {
  display: flex; align-items: center; gap: 8px;
  padding: 9px 14px; border: none; background: none; cursor: pointer;
  color: var(--dim); font-family: var(--sans); font-size: 13px; font-weight: 400;
  width: 100%; text-align: left; border-radius: 6px; margin: 1px 6px;
  width: calc(100% - 12px); transition: all .15s;
}
.nav-btn:hover { background: var(--bg3); color: var(--text); }
.nav-btn.active { background: var(--accent); color: #fff; font-weight: 600; }
.nav-btn .icon { font-size: 14px; width: 18px; flex-shrink: 0; }

/* ── Main ── */
#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

/* ── Topbar ── */
#topbar {
  height: 50px; flex-shrink: 0;
  background: var(--bg2); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 24px; gap: 12px;
}
#page-title { font-size: 15px; font-weight: 700; flex: 1; }
#status-msg {
  font-family: var(--mono); font-size: 11px;
  padding: 4px 10px; border-radius: 4px;
  background: var(--bg3); color: var(--green);
  display: none; max-width: 400px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
#status-msg.show { display: block; }
#status-msg.warn { color: var(--yellow); }
#status-msg.err  { color: var(--red); }

/* ── Content ── */
#content { flex: 1; overflow-y: auto; padding: 24px; }

/* ── Cards & Grid ── */
.stat-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px;
  margin-bottom: 24px;
}
.stat-card {
  background: var(--card); border: 1px solid var(--border); border-radius: 10px;
  padding: 16px 14px; text-align: center;
}
.stat-card .s-icon { font-size: 20px; margin-bottom: 4px; }
.stat-card .s-val  { font-family: var(--mono); font-size: 26px; font-weight: 600; }
.stat-card .s-lbl  { font-size: 11px; color: var(--dim); margin-top: 4px; }

.section-title {
  font-size: 14px; font-weight: 700; color: var(--accent2);
  margin-bottom: 12px; display: flex; align-items: center; gap: 8px;
}
.section-title::after { content:''; flex:1; height:1px; background: var(--border); }

/* ── Anime cards ── */
.anime-list { display: flex; flex-direction: column; gap: 8px; }
.anime-card {
  background: var(--card); border: 1px solid var(--border); border-radius: 10px;
  display: flex; align-items: center; gap: 12px; padding: 12px 14px;
  transition: border-color .2s;
}
.anime-card:hover { border-color: var(--accent); }
.anime-cover {
  width: 52px; height: 74px; border-radius: 6px; object-fit: cover;
  background: var(--bg3); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 20px;
}
.anime-cover img { width: 100%; height: 100%; object-fit: cover; border-radius: 6px; }
.anime-info { flex: 1; min-width: 0; }
.anime-title { font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.anime-sub   { font-size: 11px; color: var(--dim); margin-top: 2px; font-family: var(--mono); }
.badges      { display: flex; gap: 5px; margin-top: 6px; flex-wrap: wrap; }
.badge {
  font-family: var(--mono); font-size: 9px; font-weight: 600; letter-spacing: .04em;
  padding: 2px 7px; border-radius: 4px; text-transform: uppercase;
}
.badge-ongoing  { background: #0f2e1a; color: #22c55e; }
.badge-finished { background: #1a0f2e; color: #a855f7; }
.badge-paused   { background: #2e250f; color: #f59e0b; }
.badge-movie    { background: #2e1a0f; color: #f59e0b; }
.badge-blue     { background: #0f1a2e; color: #60a5fa; }
.badge-purple   { background: #1a0f2e; color: #c084fc; }
.badge-gray     { background: #1a1a2e; color: #94a3b8; }

.anime-actions { display: flex; gap: 6px; flex-shrink: 0; }
.icon-btn {
  width: 30px; height: 30px; border-radius: 6px; border: 1px solid var(--border);
  background: var(--bg3); cursor: pointer; display: flex; align-items: center;
  justify-content: center; font-size: 13px; transition: all .15s; color: var(--text);
}
.icon-btn:hover { background: var(--accent); border-color: var(--accent); }
.icon-btn.del:hover { background: var(--red); border-color: var(--red); }
.icon-btn.upd:hover { background: var(--green); border-color: var(--green); }

/* ── Forms ── */
.form-section {
  background: var(--card); border: 1px solid var(--border); border-radius: 10px;
  padding: 20px; margin-bottom: 16px;
}
.form-section h3 {
  font-family: var(--mono); font-size: 11px; font-weight: 600; letter-spacing: .1em;
  color: var(--accent2); text-transform: uppercase; margin-bottom: 14px;
}
.field { margin-bottom: 12px; }
.field label { display: block; font-size: 12px; color: var(--dim); margin-bottom: 4px; font-family: var(--mono); }
.field input, .field textarea, .field select {
  width: 100%; padding: 8px 11px; background: var(--bg3);
  border: 1px solid var(--border); border-radius: 6px;
  color: var(--text); font-size: 13px; font-family: var(--sans);
  outline: none; transition: border-color .2s;
}
.field input:focus, .field textarea:focus { border-color: var(--accent); }
.field textarea { resize: vertical; min-height: 70px; font-family: var(--mono); font-size: 12px; }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.field-row.three { grid-template-columns: 1fr 1fr 1fr; }
.toggle-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 7px 0; border-bottom: 1px solid var(--border);
}
.toggle-row label { font-size: 13px; color: var(--dim); }
.toggle-switch {
  position: relative; width: 38px; height: 20px; cursor: pointer;
}
.toggle-switch input { opacity: 0; width: 0; height: 0; position: absolute; }
.toggle-slider {
  position: absolute; inset: 0; background: var(--muted); border-radius: 20px;
  transition: .2s;
}
.toggle-slider::before {
  content: ''; position: absolute; width: 14px; height: 14px;
  left: 3px; top: 3px; background: var(--dim); border-radius: 50%; transition: .2s;
}
.toggle-switch input:checked + .toggle-slider { background: var(--accent); }
.toggle-switch input:checked + .toggle-slider::before { transform: translateX(18px); background: #fff; }

/* ── Buttons ── */
.btn {
  padding: 9px 18px; border-radius: 7px; border: none; cursor: pointer;
  font-family: var(--sans); font-size: 13px; font-weight: 600; transition: all .15s;
}
.btn-primary  { background: var(--accent);  color: #fff; }
.btn-primary:hover  { background: var(--accent2); }
.btn-success  { background: #16a34a; color: #fff; }
.btn-success:hover  { background: var(--green); }
.btn-danger   { background: #dc2626; color: #fff; }
.btn-danger:hover   { background: var(--red); }
.btn-ghost    { background: var(--bg3); color: var(--dim); border: 1px solid var(--border); }
.btn-ghost:hover    { color: var(--text); border-color: var(--dim); }
.btn-blue     { background: #1d4ed8; color: #fff; }
.btn-blue:hover     { background: var(--blue); }
.btn-row      { display: flex; gap: 10px; flex-wrap: wrap; }

/* ── Search ── */
.search-bar {
  display: flex; gap: 10px; margin-bottom: 16px; align-items: center;
}
.search-bar input {
  flex: 1; max-width: 320px;
  padding: 8px 12px; background: var(--bg3);
  border: 1px solid var(--border); border-radius: 7px;
  color: var(--text); font-size: 13px; outline: none;
}
.search-bar input:focus { border-color: var(--accent); }

/* ── Log terminal ── */
.log-terminal {
  background: #020208; border: 1px solid var(--border); border-radius: 8px;
  padding: 14px 16px; height: 420px; overflow-y: auto;
  font-family: var(--mono); font-size: 12px; line-height: 1.7;
  flex: 1;
}
.log-line         { color: #7a7a9a; }
.log-line.success { color: #22c55e; }
.log-line.error   { color: #ef4444; }
.log-line.title   { color: #a855f7; font-weight: 600; }
.log-line.info    { color: #60a5fa; }
.log-line.dim     { color: #4a4a6a; }

/* ── Tabs ── */
.tabs { display: flex; gap: 4px; margin-bottom: 16px; flex-wrap: wrap; }
.tab {
  padding: 7px 14px; border-radius: 6px; border: 1px solid var(--border);
  background: var(--bg3); color: var(--dim); cursor: pointer;
  font-size: 12px; font-weight: 600; font-family: var(--mono); transition: all .15s;
}
.tab:hover { color: var(--text); }
.tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }

/* ── Modal ── */
.modal-backdrop {
  position: fixed; inset: 0; background: rgba(0,0,0,.75);
  display: flex; align-items: center; justify-content: center; z-index: 1000;
}
.modal {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 12px;
  width: 680px; max-width: 95vw; max-height: 90vh;
  display: flex; flex-direction: column; overflow: hidden;
}
.modal-header {
  padding: 18px 22px 14px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.modal-header h2 { font-size: 16px; font-weight: 700; color: var(--accent2); }
.modal-close {
  background: none; border: none; cursor: pointer;
  color: var(--dim); font-size: 18px; padding: 0 4px;
  transition: color .15s;
}
.modal-close:hover { color: var(--red); }
.modal-body { flex: 1; overflow-y: auto; padding: 20px 22px; }
.modal-footer {
  padding: 14px 22px; border-top: 1px solid var(--border);
  display: flex; gap: 10px; justify-content: flex-end;
}

/* ── Log entries ── */
.log-entry {
  background: var(--card); border: 1px solid var(--border); border-radius: 7px;
  display: flex; gap: 0; overflow: hidden; margin-bottom: 6px;
}
.log-entry-bar { width: 4px; flex-shrink: 0; }
.log-entry-body { padding: 10px 12px; flex: 1; }
.log-entry-head { display: flex; align-items: center; justify-content: space-between; }
.log-entry-title { font-size: 13px; font-weight: 600; }
.log-entry-ts { font-family: var(--mono); font-size: 10px; color: var(--dim); }
.log-entry-detail { font-family: var(--mono); font-size: 11px; color: var(--dim); margin-top: 3px; word-break: break-all; }

/* ── Bar chart ── */
.bar-chart { display: flex; flex-direction: column; gap: 8px; }
.bar-row { display: flex; align-items: center; gap: 10px; }
.bar-label { font-family: var(--mono); font-size: 11px; color: var(--dim); width: 130px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.bar-track { flex: 1; height: 14px; background: var(--bg3); border-radius: 7px; overflow: hidden; }
.bar-fill  { height: 100%; background: var(--accent); border-radius: 7px; transition: width .6s ease; }
.bar-count { font-family: var(--mono); font-size: 11px; font-weight: 600; color: var(--accent2); width: 28px; text-align: right; }

/* ── Modal tabs ── */
.mtabs { display: flex; gap: 4px; margin-bottom: 16px; flex-wrap: wrap; }
.mtab {
  padding: 5px 12px; border-radius: 5px; border: 1px solid var(--border);
  background: var(--bg3); color: var(--dim); cursor: pointer;
  font-size: 11px; font-family: var(--mono); transition: all .15s;
}
.mtab:hover { color: var(--text); }
.mtab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.mtab-panel { display: none; }
.mtab-panel.active { display: block; }

/* ── Progress ── */
.progress { width: 100%; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; margin-bottom: 16px; }
.progress-fill { height: 100%; background: var(--accent); width: 0; transition: width .3s; }
.progress.indeterminate .progress-fill { width: 40%; animation: progress-anim 1.2s ease-in-out infinite; }
@keyframes progress-anim { 0%{transform:translateX(-100%)} 100%{transform:translateX(350%)} }

/* ── Empty state ── */
.empty { text-align: center; padding: 60px 20px; color: var(--dim); font-size: 14px; }
.empty .empty-icon { font-size: 40px; margin-bottom: 12px; }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg2); }
::-webkit-scrollbar-thumb { background: var(--muted); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--dim); }

/* ── Info box ── */
.info-box {
  background: var(--bg3); border: 1px solid var(--border); border-radius: 8px;
  padding: 12px 16px; margin-bottom: 14px;
  font-family: var(--mono); font-size: 11px; color: var(--dim);
}
.info-box b { color: var(--accent2); }

.tag-chip {
  display: inline-flex; gap: 4px; align-items: center;
  padding: 4px 10px; border-radius: 999px;
  font-size: 11px; font-family: var(--mono); cursor: pointer; transition: all .15s;
}

/* ── Loading overlay ── */
#loading-overlay {
  position: fixed; inset: 0; background: rgba(7,7,15,.9);
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 14px; z-index: 2000;
}
.spinner {
  width: 40px; height: 40px; border: 3px solid var(--border);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="loading-overlay">
  <div class="spinner"></div>
  <div style="font-family:var(--mono);font-size:12px;color:var(--dim)">Carregando banco de dados...</div>
</div>

<div id="app">
  <!-- Sidebar -->
  <nav id="sidebar">
    <div class="logo">
      <div class="logo-icon">🎌</div>
      <div class="logo-title">Anime Admin</div>
      <div class="logo-sub" id="db-count">— animes</div>
    </div>

    <div class="nav-section">Menu</div>
    <button class="nav-btn active" data-page="dashboard"><span class="icon">🏠</span> Dashboard</button>
    <button class="nav-btn" data-page="list"><span class="icon">📋</span> Lista Animes</button>
    <button class="nav-btn" data-page="add"><span class="icon">➕</span> Adicionar</button>
    <button class="nav-btn" data-page="update"><span class="icon">🔄</span> Auto-Update</button>
    <button class="nav-btn" data-page="check"><span class="icon">🔍</span> Verificar Eps</button>
    <button class="nav-btn" data-page="stats"><span class="icon">📊</span> Estatísticas</button>
    <button class="nav-btn" data-page="logs"><span class="icon">📜</span> Logs</button>
    <button class="nav-btn" data-page="pageconfig"><span class="icon">⚙️</span> Config Página</button>

    <div class="nav-sep"></div>
    <div class="nav-section">Git</div>
    <button class="nav-btn" data-page="push"><span class="icon">☁️</span> Push GitHub</button>
    <button class="nav-btn" data-page="pull"><span class="icon">⬇️</span> Pull GitHub</button>
  </nav>

  <!-- Main -->
  <div id="main">
    <div id="topbar">
      <div id="page-title">Dashboard</div>
      <div id="status-msg"></div>
    </div>
    <div id="content"></div>
  </div>
</div>

<!-- Edit Modal -->
<div id="edit-modal" class="modal-backdrop" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <h2 id="edit-modal-title">✏️ Editar Anime</h2>
      <button class="modal-close" onclick="closeEditModal()">✕</button>
    </div>
    <div class="modal-body" id="edit-modal-body"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeEditModal()">Cancelar</button>
      <button class="btn btn-success" onclick="submitEdit()">💾 Salvar Tudo</button>
    </div>
  </div>
</div>

<!-- Confirm Modal -->
<div id="confirm-modal" class="modal-backdrop" style="display:none">
  <div class="modal" style="width:420px">
    <div class="modal-header">
      <h2>⚠️ Confirmar</h2>
      <button class="modal-close" onclick="closeConfirm()">✕</button>
    </div>
    <div class="modal-body">
      <p id="confirm-msg" style="font-size:14px;line-height:1.6"></p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeConfirm()">Cancelar</button>
      <button class="btn btn-danger" id="confirm-ok">Confirmar</button>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════════════
let DB = [];
let currentPage = 'dashboard';
let editAnime   = null;

const pages = {
  'dashboard': 'Dashboard',
  'list':      '📋 Lista de Animes',
  'add':       '➕ Adicionar Anime',
  'update':    '🔄 Auto-Update',
  'check':     '🔍 Verificar Episódios',
  'stats':     '📊 Estatísticas',
  'logs':      '📜 Logs & Histórico',
  'pageconfig':'⚙️ Configurações da Página',
  'push':      '☁️ Git Push',
  'pull':      '⬇️ Pull GitHub',
};

// ════════════════════════════════════════════════════════════
// UTILS
// ════════════════════════════════════════════════════════════
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const $ = id => document.getElementById(id);

function setStatus(msg, type='ok') {
  const el = $('status-msg');
  el.textContent = msg;
  el.className = 'show ' + (type==='ok'?'':type);
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 5000);
}

async function api(path, method='GET', body=null) {
  const opts = { method, headers: {'Content-Type':'application/json'} };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(path, opts);
  return r.json();
}

function toggle(id, label='', dflt=true) {
  return `<div class="toggle-row">
    <label>${esc(label)}</label>
    <label class="toggle-switch">
      <input type="checkbox" id="${id}" ${dflt?'checked':''}>
      <span class="toggle-slider"></span>
    </label>
  </div>`;
}

function field(id, label, val='', ph='', type='text') {
  return `<div class="field">
    <label for="${id}">${esc(label)}</label>
    <input type="${type}" id="${id}" value="${esc(val)}" placeholder="${esc(ph)}">
  </div>`;
}

function textarea(id, label, val='', ph='') {
  return `<div class="field">
    <label for="${id}">${esc(label)}</label>
    <textarea id="${id}" placeholder="${esc(ph)}">${esc(val)}</textarea>
  </div>`;
}

function segmented(id, label, options, current) {
  const opts = options.map(o =>
    `<button type="button" class="tab ${o===current?'active':''}" onclick="segSelect('${id}',this,'${o}')">${o}</button>`
  ).join('');
  return `<div class="field">
    <label>${esc(label)}</label>
    <input type="hidden" id="${id}" value="${current}">
    <div class="tabs" style="margin-bottom:0">${opts}</div>
  </div>`;
}
function segSelect(id, btn, val) {
  const parent = btn.closest('.tabs');
  parent.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  $(id).value = val;
}

function badgeFor(status, type) {
  if (type === 'movie') return `<span class="badge badge-movie">🎬 Filme</span>`;
  if (status === 'ongoing')  return `<span class="badge badge-ongoing">● Ongoing</span>`;
  if (status === 'paused')   return `<span class="badge badge-paused">⏸ Pausado</span>`;
  return `<span class="badge badge-finished">✓ Finalizado</span>`;
}

function animeInfo(a) {
  const seasons = a.seasons || [];
  const last    = seasons[seasons.length - 1] || {};
  return { seasons, last };
}

function startSSE(streamId, onMsg, onDone) {
  const es = new EventSource(`/api/stream/${streamId}`);
  es.onmessage = e => {
    const d = JSON.parse(e.data);
    if (d.type === 'done') { es.close(); if(onDone) onDone(d); }
    else if (d.type === 'log') { if(onMsg) onMsg(d.msg, d.lvl); }
  };
  es.onerror = () => { es.close(); if(onDone) onDone({}); };
  return es;
}

function writeLog(terminal, msg, lvl='info') {
  const line = document.createElement('div');
  line.className = `log-line ${lvl}`;
  line.textContent = msg;
  terminal.appendChild(line);
  terminal.scrollTop = terminal.scrollHeight;
}

function navigate(page) {
  currentPage = page;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.page===page));
  $('page-title').textContent = pages[page] || page;
  const c = $('content');
  c.innerHTML = '';
  if      (page === 'dashboard')  renderDashboard();
  else if (page === 'list')       renderList();
  else if (page === 'add')        renderAdd();
  else if (page === 'update')     renderUpdate(false);
  else if (page === 'check')      renderUpdate(true);
  else if (page === 'stats')      renderStats();
  else if (page === 'logs')       renderLogs();
  else if (page === 'pageconfig') renderPageconfig();
  else if (page === 'push')       renderPush();
  else if (page === 'pull')       renderPull();
}

  const ql = q.toLowerCase();
  const filtered = ql ? DB.filter(a => a.title?.toLowerCase().includes(ql) || a.id?.toLowerCase().includes(ql)) : DB;
  renderAnimeCards(filtered);
}

function renderAnimeCards(list) {
  const el = $('anime-list');
  if (!el) return;
  if (!list.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">🗃️</div>Nenhum anime encontrado.</div>`;
    return;
  }
  el.innerHTML = list.map(a => {
    const { seasons, last } = animeInfo(a);
    const status   = last.status || '?';
    const isMovie  = last.type === 'movie';
    const cur      = last.currentEpisode ?? '?';
    const tot      = last.episodes ?? '?';
    const score    = parseFloat(last.score || 0);
    const audios   = new Set();
    seasons.forEach(s => s.audios?.forEach(au => { if(au.available) audios.add(au.type.toUpperCase()); }));
    return `
    <div class="anime-card">
      <div class="anime-cover" id="cover-${esc(a.id)}">🎌</div>
      <div class="anime-info">
        <div class="anime-title">${esc(a.title || a.id)}</div>
        <div class="anime-sub">${esc(a.studio||'?')}  ·  ${esc(last.year||'?')}</div>
        <div class="badges">
          ${badgeFor(status, isMovie?'movie':null)}
          <span class="badge badge-blue">S${seasons.length}</span>
          <span class="badge badge-gray">EP ${cur}/${tot}</span>
          ${score ? `<span class="badge badge-movie">★ ${score}</span>` : ''}
          ${[...audios].map(au => `<span class="badge badge-purple">${au}</span>`).join('')}
        </div>
      </div>
      <div class="anime-actions">
        <button class="icon-btn" title="Editar" onclick="openEdit('${esc(a.id)}')">✏️</button>
        <button class="icon-btn upd" title="Atualizar eps" onclick="updateOne('${esc(a.id)}')">🔄</button>
        <button class="icon-btn del" title="Remover" onclick="confirmDelete('${esc(a.id)}','${esc(a.title||a.id)}')">🗑️</button>
      </div>
    </div>`;
  }).join('');

  // Lazy-load covers
  list.forEach(a => {
    if (!a.coverImage) return;
    const el = $(`cover-${a.id}`);
    if (!el) return;
    const img = new Image();
    img.onload = () => { el.innerHTML = `<img src="${a.coverImage}" alt="">`; };
    img.src = a.coverImage;
  });
}

function renderUpdate(dry) {
  const c = $('content');
  c.innerHTML = `
  <div style="max-width:820px">
    <p style="color:var(--dim);font-size:13px;margin-bottom:16px">
      ${dry ? 'Apenas verifica disponibilidade, sem salvar nada.' : 'Verifica e adiciona novos episódios via AniVideo CDN.'}
    </p>
    <div class="btn-row" style="margin-bottom:14px">
      <button class="btn btn-primary" id="run-btn" onclick="runUpdate(${dry})">
        ${dry ? '🔍 Verificar Agora' : '🚀 Iniciar Update'}
      </button>
      <button class="btn btn-ghost" onclick="$('update-log').innerHTML=''">🗑️ Limpar</button>
    </div>
    <div id="update-progress" class="progress" style="display:none"><div class="progress-fill indeterminate"></div></div>
    <div id="update-log" class="log-terminal"></div>
  </div>`;
  $('update-log').innerHTML = '';
  writeLog($('update-log'), 'Pronto. Pressione o botão para iniciar.', 'dim');
}

async function runUpdate(dry) {
  const btn  = $('run-btn');
  const log  = $('update-log');
  const prog = $('update-progress');
  btn.disabled = true;
  log.innerHTML = '';
  prog.style.display = 'block';
  writeLog(log, `╔══ ${dry?'VERIFICAÇÃO (dry run)':'UPDATE COMPLETO'} ══╗`, 'title');

  const res = await api('/api/update', 'POST', {dry});
  startSSE(res.stream_id,
    (msg, lvl) => writeLog(log, msg, lvl),
    async (d) => {
      prog.style.display = 'none';
      btn.disabled = false;
      if (!dry) { DB = await api('/api/db'); updateDbCount(); }
      const n = (d.changed||[]).length;
      setStatus(n ? `${n} anime(s) atualizados!` : 'Nenhum ep novo.', n ? 'ok' : 'warn');
    }
  );
}

async function updateOne(animeId) {
  navigate('update');
  await new Promise(r => setTimeout(r, 50));
  const log  = $('update-log');
  const prog = $('update-progress');
  if (!log) return;
  log.innerHTML = '';
  if (prog) prog.style.display = 'block';
  const res = await api(`/api/update_one/${animeId}`, 'POST');
  startSSE(res.stream_id,
    (msg, lvl) => writeLog(log, msg, lvl),
    async () => {
      if (prog) prog.style.display = 'none';
      DB = await api('/api/db');
      updateDbCount();
      setStatus('Anime atualizado!');
    }
  );
}

    <div class="form-section">
      <h3>⬇️ Pull do GitHub</h3>
      <p style="font-size:13px;color:var(--dim);margin-bottom:14px">
        Baixa o output.json da branch <code style="color:var(--accent2)">data</code> do repositório e sobrescreve o banco local.
      </p>
      <button class="btn btn-primary" onclick="doPull()">⬇️ Executar Pull</button>
    </div>
    <div id="pull-output" class="log-terminal" style="display:none;margin-top:14px;height:120px"></div>
  </div>`;
}

async function doPull() {
  const out = $('pull-output');
  out.style.display = 'block';
  out.innerHTML = '';
  writeLog(out, 'Baixando do GitHub...', 'dim');
  const r = await api('/api/git/pull', 'POST');
  if (r.ok) {
    DB = await api('/api/db');
    updateDbCount();
    writeLog(out, `✅ ${r.count} animes carregados!`, 'success');
    setStatus(`${r.count} animes carregados!`);
  } else {
    writeLog(out, `❌ Erro: ${r.error}`, 'error');
    setStatus(`Erro: ${r.error}`, 'err');
  }
}

// ════════════════════════════════════════════════════════════
// EDIT MODAL
// ════════════════════════════════════════════════════════════
function openEdit(animeId) {
  editAnime = DB.find(a => a.id === animeId);
  if (!editAnime) return;
  $('edit-modal-title').textContent = `✏️  ${editAnime.title || animeId}`;
  const body = $('edit-modal-body');

  const seasons = editAnime.seasons || [];
  const tabBtns  = [`<button class="mtab active" onclick="switchMTab(this,'etab-general')">🎌 Geral</button>`];
  const tabPanels = [`<div class="mtab-panel active" id="etab-general">${buildGeneralTab(editAnime)}</div>`];

  seasons.forEach((s, i) => {
    const isMovie = s.type === 'movie';
    const icon = isMovie ? '🎬' : '📺';
    const lbl  = s.seasonLabel || `S${s.season}`;
    const tid  = `etab-s${i}`;
    tabBtns.push(`<button class="mtab" onclick="switchMTab(this,'${tid}')">${icon} ${esc(lbl.slice(0,18))}</button>`);
    tabPanels.push(`<div class="mtab-panel" id="${tid}">${buildSeasonTab(s, i, isMovie)}</div>`);
  });

  body.innerHTML = `
  <div class="mtabs">${tabBtns.join('')}</div>
  ${tabPanels.join('')}
  <div id="edit-mal-status" style="font-family:var(--mono);font-size:11px;color:var(--dim);min-height:18px;margin-top:8px"></div>
  <div class="btn-row" style="margin-top:10px">
    <button class="btn btn-blue" onclick="editRefetchMAL()">🔍 Re-buscar MAL</button>
    <button class="btn" style="background:#6366f1;color:#fff" onclick="editRefetchBanner()">☁️ Re-buscar Banner CR</button>
  </div>`;

  $('edit-modal').style.display = 'flex';
}

function buildGeneralTab(a) {
  return `
  <div class="field-row">
    ${field('e-title','Título', a.title||'')}
    ${field('e-title-j','Título Japonês', a.titleJapanese||'')}
  </div>
  <div class="field-row">
    ${field('e-studio','Estúdio', a.studio||'')}
    ${field('e-genres','Gêneros (vírgula)', (a.genre||[]).join(', '))}
  </div>
  <div class="field-row">
    ${field('e-cover','Cover URL', a.coverImage||'')}
    ${field('e-banner','Banner URL', a.bannerImage||'')}
  </div>
  <div class="field-row">
    ${field('e-mal-id','MAL ID', a.malId||'')}
    <div></div>
  </div>
  ${toggle('e-rec','Recomendado?', a.recommended)}
  ${toggle('e-adult','🔞 Conteúdo Adulto?', a.adultContent)}`;
}

function buildSeasonTab(s, idx, isMovie) {
  const audios  = s.audios || [];
  const hasSub  = audios.find(a => a.type==='sub')?.available || false;
  const hasDub  = audios.find(a => a.type==='dub')?.available || false;
  const subEps  = audios.find(a => a.type==='sub')?.episodesAvailable || 0;
  const dubEps  = audios.find(a => a.type==='dub')?.episodesAvailable || 0;
  const sid     = `s${idx}`;

  let html = `
  <div class="field-row">
    ${field(`e-${sid}-label`,'Season Label', s.seasonLabel||'')}
    ${field(`e-${sid}-year`,'Ano', s.year||'')}
  </div>
  <div class="field-row three">
    ${field(`e-${sid}-eps`,'Total eps', s.episodes||'')}
    ${field(`e-${sid}-cur`,'Ep atual', s.currentEpisode||'')}
    ${field(`e-${sid}-score`,'Score', s.score||'')}
  </div>
  ${textarea(`e-${sid}-synopsis`,'Sinopse', s.synopsis||'')}
  ${field(`e-${sid}-trailer`,'Trailer URL', s.trailer||'')}
  ${segmented(`e-${sid}-status`,'Status', ['ongoing','finished','paused'], s.status||'ongoing')}

  <div style="font-family:var(--mono);font-size:10px;color:var(--accent2);text-transform:uppercase;letter-spacing:.1em;margin:10px 0 6px">🎧 Áudios</div>
  ${toggle(`e-${sid}-has-sub`,'Tem Legendado?', hasSub)}
  ${field(`e-${sid}-sub-eps`,'Eps legendado disponíveis', subEps)}
  ${toggle(`e-${sid}-has-dub`,'Tem Dublado?', hasDub)}
  ${field(`e-${sid}-dub-eps`,'Eps dublado disponíveis', dubEps)}`;

  if (isMovie) {
    html += `
    <div style="font-family:var(--mono);font-size:10px;color:var(--accent2);text-transform:uppercase;letter-spacing:.1em;margin:10px 0 6px">🎥 Campos do Filme</div>
    <div class="field-row">
      ${field(`e-${sid}-mv-title`,'Título do Filme', s.movieTitle||'')}
      ${field(`e-${sid}-mv-tag`,'Tagline', s.tagline||'')}
    </div>
    <div class="field-row three">
      ${field(`e-${sid}-mv-rt`,'Runtime (min)', s.runtime||'')}
      ${field(`e-${sid}-mv-dir`,'Diretor', s.director||'')}
      ${field(`e-${sid}-mv-age`,'Classificação', s.ageRating||'')}
    </div>
    ${field(`e-${sid}-mv-acc`,'Accent Color', s.accentColor||'#FF2E2E')}
    ${field(`e-${sid}-mv-post`,'Poster URL', s.posterImage||'')}
    ${field(`e-${sid}-mv-stills`,'Stills (vírgula)', (s.stills||[]).join(', '))}
    ${textarea(`e-${sid}-mv-cast`,'Cast (personagem|voice|voiceDub)', (s.cast||[]).map(c=>`${c.character}|${c.voice}|${c.voiceDub||'—'}`).join('\n'))}
    ${field(`e-${sid}-mv-awards`,'Awards (vírgula)', (s.awards||[]).join(', '))}`;
  }

  return html;
}

function switchMTab(btn, panelId) {
  btn.closest('.modal-body').querySelectorAll('.mtab').forEach(b => b.classList.remove('active'));
  btn.closest('.modal-body').querySelectorAll('.mtab-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  const panel = document.getElementById(panelId);
  if (panel) panel.classList.add('active');
}

function closeEditModal() { $('edit-modal').style.display = 'none'; editAnime = null; }

async function submitEdit() {
  if (!editAnime) return;
  const a = editAnime;
  a.title = a.titleRomaji = $('e-title').value;
  a.titleJapanese = $('e-title-j').value;
  a.studio        = $('e-studio').value;
  a.genre         = $('e-genres').value.split(',').map(g=>g.trim()).filter(Boolean);
  a.coverImage    = $('e-cover').value;
  a.bannerImage   = $('e-banner').value;
  a.recommended   = $('e-rec').checked;
  a.adultContent  = $('e-adult').checked;
  a.malId         = parseInt($('e-mal-id').value)||0;

  (a.seasons||[]).forEach((s, i) => {
    const sid = `s${i}`;
    const isMovie = s.type === 'movie';
    s.seasonLabel     = $(`e-${sid}-label`)?.value || s.seasonLabel;
    s.year            = parseInt($(`e-${sid}-year`)?.value)||s.year;
    s.episodes        = parseInt($(`e-${sid}-eps`)?.value)||s.episodes;
    s.currentEpisode  = parseInt($(`e-${sid}-cur`)?.value)||s.currentEpisode;
    s.score           = parseFloat($(`e-${sid}-score`)?.value)||s.score;
    s.synopsis        = $(`e-${sid}-synopsis`)?.value || s.synopsis;
    s.trailer         = $(`e-${sid}-trailer`)?.value || s.trailer;
    s.status          = $(`e-${sid}-status`)?.value || s.status;
    const hasSub = $(`e-${sid}-has-sub`)?.checked;
    const hasDub = $(`e-${sid}-has-dub`)?.checked;
    const subEps = parseInt($(`e-${sid}-sub-eps`)?.value)||0;
    const dubEps = parseInt($(`e-${sid}-dub-eps`)?.value)||0;
    (s.audios||[]).forEach(au => {
      if (au.type==='sub') { au.available = hasSub; au.episodesAvailable = subEps; }
      if (au.type==='dub') { au.available = hasDub; au.episodesAvailable = dubEps; }
    });
    if (isMovie) {
      s.movieTitle  = $(`e-${sid}-mv-title`)?.value||s.movieTitle;
      s.tagline     = $(`e-${sid}-mv-tag`)?.value||'';
      s.director    = $(`e-${sid}-mv-dir`)?.value||'';
      s.ageRating   = $(`e-${sid}-mv-age`)?.value||'';
      s.accentColor = $(`e-${sid}-mv-acc`)?.value||'#FF2E2E';
      s.posterImage = $(`e-${sid}-mv-post`)?.value||'';
      s.runtime     = parseInt($(`e-${sid}-mv-rt`)?.value)||0;
      const stills  = $(`e-${sid}-mv-stills`)?.value||'';
      s.stills      = stills.split(',').map(x=>x.trim()).filter(Boolean);
      const awards  = $(`e-${sid}-mv-awards`)?.value||'';
      s.awards      = awards.split(',').map(x=>x.trim()).filter(Boolean);
      const castRaw = $(`e-${sid}-mv-cast`)?.value||'';
      s.cast        = castRaw.trim().split('\n').filter(Boolean).map(line => {
        const p = line.split('|').map(x=>x.trim());
        return {character:p[0]||'',voice:p[1]||'',voiceDub:p[2]||'—'};
      });
    }
  });

  await api(`/api/anime/${a.id}`, 'PUT', a);
  closeEditModal();
  setStatus(`'${a.title}' salvo!`);
  if (currentPage === 'list') navigate('list');
}

async function editRefetchMAL() {
  const name = $('e-title')?.value?.trim();
  if (!name) return;
  const st = $('edit-mal-status');
  st.style.color = 'var(--yellow)'; st.textContent = 'Buscando MAL...';
  const mal = await api(`/api/mal/search?q=${encodeURIComponent(name)}`);
  if (mal.error) { st.style.color='var(--red)'; st.textContent='❌ Não encontrado.'; return; }
  $('e-title').value    = mal.title||name;
  $('e-title-j').value  = mal.title_japanese||'';
  $('e-studio').value   = mal.studios?.[0]?.name||'';
  $('e-genres').value   = (mal.genres||[]).map(g=>g.name).join(', ');
  $('e-cover').value    = mal.images?.jpg?.large_image_url||'';
  $('e-mal-id').value   = mal.mal_id||'';
  st.style.color='var(--green)'; st.textContent=`✅ MAL: ${mal.title}`;
}

async function editRefetchBanner() {
  const name    = $('e-title')?.value?.trim();
  const fallback= $('e-cover')?.value?.trim();
  if (!name) return;
  const st = $('edit-mal-status');
  st.style.color='var(--yellow)'; st.textContent='Buscando banner CR... (~15s)';
  const r = await api(`/api/cr_banner?name=${encodeURIComponent(name)}&fallback=${encodeURIComponent(fallback)}`);
  $('e-banner').value = r.banner;
  st.style.color = r.found ? 'var(--green)' : 'var(--yellow)';
  st.textContent = r.found ? '✅ Banner encontrado!' : '⚠️ Não encontrado — usando cover';
}

// ════════════════════════════════════════════════════════════
// DELETE
// ════════════════════════════════════════════════════════════
let _confirmCb = null;
function confirmDelete(id, title) {
  $('confirm-msg').textContent = `Remover '${title}'?`;
  _confirmCb = async () => {
    await api(`/api/anime/${id}`, 'DELETE');
    DB = DB.filter(a => a.id !== id);
    updateDbCount();
    setStatus(`'${title}' removido.`, 'warn');
    navigate('list');
  };
  $('confirm-modal').style.display = 'flex';
}
$('confirm-ok').addEventListener('click', () => { if(_confirmCb) _confirmCb(); closeConfirm(); });
function closeConfirm() { $('confirm-modal').style.display = 'none'; _confirmCb = null; }

// ════════════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════════════
function updateDbCount() {
  $('db-count').textContent = `${DB.length} animes`;
}

async function init() {
  DB = await api('/api/db');
  updateDbCount();
  $('loading-overlay').style.display = 'none';
  navigate('dashboard');
}

init();
</script>
